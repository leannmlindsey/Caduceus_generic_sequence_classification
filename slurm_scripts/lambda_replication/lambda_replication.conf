# Caduceus LAMBDA_v1 replication config.
#
# Sourced by:
#   slurm_scripts/lambda_replication/run_lambda_training.sh
#   slurm_scripts/lambda_replication/run_lambda_inference.sh
#   slurm_scripts/lambda_replication/check_training.sh
#   slurm_scripts/lambda_replication/check_inference.sh
#
# Workflow:
#   1. (one time) confirm the pretrained checkpoint + config_path exist on Biowulf.
#   2. bash slurm_scripts/lambda_replication/run_lambda_training.sh
#   3. wait for jobs to finish (squeue -u $USER); bash .../check_training.sh
#   4. bash slurm_scripts/lambda_replication/run_lambda_inference.sh
#   5. wait; bash .../check_inference.sh
#
# The pipeline loops over SEGMENT_LENGTHS. For each length it runs:
#   finetune x N seeds (training stage; `python -m train`, Hydra), then
#   best-of-N seed selection by test-set MCC -> winners.json, then inference on
#   the matching-length diagnostics (test/fpr/fnr/gc_control), genome-wide CSVs,
#   and a pretrained embedding analysis (linear probe + 3-layer NN). Outputs are
#   per-length under a single OUTPUT_DIR tree.

# --- REQUIRED -----------------------------------------------------------------

# LAMBDA_v1 dataset root. Expected structure (LAMBDA_v1 layout):
#   $LAMBDA_BASE/train_val_test/<LEN>/{train,val,test}.csv     mixed phage+bacteria
#   $LAMBDA_BASE/fpr_test/<LEN>/bacteria_segments_<LEN>.csv    bacteria-only (FPR control)
#   $LAMBDA_BASE/shuffled_controls/<LEN>/test_shuffled.csv     GC-preserving shuffled control
export LAMBDA_BASE="/work/hdd/bfzj/llindsey1/LAMBDA_REPLICATION/LAMBDA_v1"

# Replication output root. Per-length results land under here:
#   $OUTPUT_DIR/<LEN>/finetune/<variant>/seed-<N>/   test_results.json + checkpoints/
#   $OUTPUT_DIR/<LEN>/embedding/<variant>/           embedding_analysis results
#   $OUTPUT_DIR/<LEN>/winners.json                   picked by run_lambda_inference.sh
#   $OUTPUT_DIR/<LEN>/inference/<variant>/           <dataset>_predictions.csv + _metrics.json
#   $OUTPUT_DIR/logs/                                SLURM stdout/stderr (shared)
#
# Delta-AI work tree (Biowulf /data and /gpfs paths are gone; access ended 2026-06-09).
export OUTPUT_DIR="/work/hdd/bfzj/llindsey1/LAMBDA_REPLICATION/Caduceus_generic_sequence_classification/outputs"

# Sequence lengths to run. Caduceus is a single-nucleotide (char) tokenizer, so
# 1 token = 1 bp. The pretrained checkpoint is seqlen-8k, so 2k/4k/8k are all
# supported. Set to a subset (e.g. "2k 4k") to run fewer windows.
export SEGMENT_LENGTHS="2k 4k 8k"

# --- REQUIRED: pretrained Caduceus model (LOCAL paths, not an HF id) ---------

# Pretrained Caduceus-PS seqlen-8k checkpoint + model_config.json, transferred to
# Delta (custom self-pretrained model; the Biowulf /data copy is inaccessible).
# CONFIG_PATH is also used for inference and embedding analysis.
export CKPT_DIR="/work/hdd/bfzj/llindsey1/LAMBDA_REPLICATION/Caduceus_generic_sequence_classification/checkpoints/caduceus-ps_seqlen-8k_d_model-256_n_layer-4_lr-8e-3"
export CONFIG_PATH="${CKPT_DIR}/model_config.json"
export PRETRAINED_PATH="${CKPT_DIR}/checkpoints/last.ckpt"

# --- OPTIONAL: diagnostics NOT in the train_val_test split -------------------

# FNR (false negative rate) test sets — phage-only sequences. Per-length CSV.
# Variable name is FNR_<LEN> where <LEN> matches an entry in SEGMENT_LENGTHS.
# Leave empty/unset to skip the FNR diagnostic for that length.
# NOTE: 2k uses the sliding-window segment set (phage_segments_2k_1k.csv),
# consistent with the 4k/8k sliding-window files. This is the FNR diagnostic and
# is DISTINCT from the PHROG diagnostic below, which uses the phrog-annotated CDS
# subset (phage_annotated_segments_2k.csv). Both are required; neither is wrong.
export FNR_2k="${LAMBDA_BASE}/fnr_test/2k/phage_segments_2k_1k.csv"          # VERIFIED in-dataset
export FNR_4k="${LAMBDA_BASE}/fnr_test/4k/phage_segments_4k_2k.csv"          # VERIFIED
export FNR_8k="${LAMBDA_BASE}/fnr_test/8k/phage_segments_8k_4k.csv"          # VERIFIED

# PHROG (phage-annotated) diagnostic — 2k ONLY. The phrog-annotated CDS subset
# (phage_annotated_segments_2k.csv), DISTINCT from the FNR sliding-window file
# above. Feeds the paper's PHROG category-sensitivity table. inference.py keeps
# all input columns except 'sequence', so the output carries phrog_db_category +
# pred_label that the PHROG table groups by. Per-length var PHROG_<LEN>.
export PHROG_2k="${LAMBDA_BASE}/fnr_test/2k/phage_annotated_segments_2k.csv"

# Model-prefixed name the central PHROG table reads:
#   ${PHROG_MODEL_TAG}_<input-stem>_predictions.csv
#   -> Caduceus_phage_annotated_segments_2k_predictions.csv
export PHROG_MODEL_TAG="Caduceus"

# Genome-wide inputs — per-length DIRECTORY of *.csv segment files (one
# inference job per CSV per variant). Leave empty/unset to skip genome-wide.
# Missing dirs are warned-and-skipped.
export GENOME_WIDE_2k="${LAMBDA_BASE}/genome_wide/2k"   # VERIFIED
export GENOME_WIDE_4k="${LAMBDA_BASE}/genome_wide/4k"   # VERIFIED
export GENOME_WIDE_8k="${LAMBDA_BASE}/genome_wide/8k"   # VERIFIED

# FPR (bacteria-only) and GC control (shuffled) are AUTO-DERIVED by the
# inference driver from LAMBDA_BASE — they are NOT set here:
#   ${LAMBDA_BASE}/fpr_test/<LEN>/bacteria_segments_<LEN>.csv      (FPR control)
#   ${LAMBDA_BASE}/shuffled_controls/<LEN>/test_shuffled.csv       (GC control)

# --- OPTIONAL: model + training hyperparameters ------------------------------

# Caduceus has a single architecture/variant here. Keeping the variant loop
# mirrors the ProkBERT/DNABERT-2/NT-v2 layout (outputs/<len>/finetune/<variant>/...).
export VARIANTS="caduceus"

# Caduceus model registry settings (from run_csv_binary.sh defaults).
export MODEL="caduceus"
export MODEL_NAME="dna_embedding_caduceus"

# Post-hoc reverse-complement conjoining. CONJOIN_TEST=false matches the
# committed wrapper_run_csv_binary.sh (the LAMBDA runs use no post-hoc RC at test).
export CONJOIN_TEST="false"
export CONJOIN_TRAIN_DECODER="true"

# Random seeds for finetuning (one finetune job per variant per seed).
# The embedding analysis (linear probe + 3-layer NN) always runs with EMB_SEED.
export SEEDS="1 2 3 4 5"

# Finetune hyperparameters (from wrapper_run_csv_binary.sh LAMBDA recipe).
export LR="1e-4"
export MAX_EPOCHS="10"
export D_OUTPUT="2"
export RC_AUG="false"

# Per-window max TOKEN length. Caduceus char tokenizer: 1 token = 1 bp, so the
# token length equals the window in bp. The pretrained checkpoint is seqlen-8k,
# so 8k is supported.
#   2k seq -> 2048 tokens
#   4k seq -> 4096 tokens
#   8k seq -> 8192 tokens
export MAX_LENGTH_2k="2048"
export MAX_LENGTH_4k="4096"
export MAX_LENGTH_8k="8192"

# Per-window train batch size (wrapper_run_csv_binary.sh used 32; longer windows
# need a smaller batch to fit memory — adjust if you hit OOM on 4k/8k).
export BATCH_SIZE_2k="32"
export BATCH_SIZE_4k="16"
export BATCH_SIZE_8k="8"

# Embedding analysis hyperparameters (from run_embedding_analysis.sh).
export POOLING="mean"           # mean | first | last
export EMB_SEED="42"
export NN_EPOCHS="100"
export NN_HIDDEN_DIM="256"
export NN_LR="0.001"
export EMB_BATCH_SIZE="32"

# Include a random-init baseline encoder alongside pretrained ("true"|"false").
# When true, src.embedding_analysis also extracts embeddings from a
# randomly-initialized model, trains LP + 3-layer NN on those, and reports
# embedding power (pretrained - random). Pretrained embeddings are cached, so
# flipping false->true after a first run only adds the random arm.
export INCLUDE_RANDOM_BASELINE="true"

# --- OPTIONAL: inference -----------------------------------------------------

export INF_BATCH_SIZE="32"
export INF_THRESHOLD="0.5"

# Winning-checkpoint filename written by `python -m train` inside each seed dir,
# relative to the seed dir. The csv_binary experiment runs with
# cross_validation=true, which loads the best-val checkpoint (monitor
# val/accuracy, mode max) for the test phase; that checkpoint is saved at
# checkpoints/val/accuracy.ckpt (filename=${train.monitor}, auto_insert_metric_name=False).
# The model_checkpoint_every_n_steps callback (save_last=true) also writes
# checkpoints/last.ckpt. The inference job prefers WINNER_CKPT_RELPATH and falls
# back to checkpoints/last.ckpt if the preferred file is absent.
export WINNER_CKPT_RELPATH="checkpoints/val/accuracy.ckpt"

# --- OPTIONAL: SLURM resources -----------------------------------------------

export FT_MEM="64g"
export FT_TIME="24:00:00"
export EMB_MEM="64g"
export EMB_TIME="4:00:00"
export INF_MEM="32g"
export INF_TIME="2:00:00"

# Conda environment that has torch + the Caduceus deps.
export CONDA_ENV="/work/hdd/bfzj/llindsey1/conda/envs/caduceus_env"
